# We have a conf and classes directory, add to BBPATH
BBPATH .= ":${LAYERDIR}"

# We have recipes-* directories, add to BBFILES
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "meta-syruse"
BBFILE_PATTERN_meta-syruse = "^${LAYERDIR}/"
BBFILE_PRIORITY_meta-syruse = "10"

LAYERDEPENDS_meta-syruse = "core"
LAYERSERIES_COMPAT_meta-syruse = "walnascar"

#PLACE THESE INTO local.conf
INIT_MANAGER = "systemd"

IMAGE_INSTALL:append = " wlroots "
PREFERRED_VERSION_wlroots = "0.19-dev"

IMAGE_INSTALL:append = " my-launcher "
IMAGE_INSTALL:append = " wl-compositor "
IMAGE_INSTALL:append = " qt6-main-app "
